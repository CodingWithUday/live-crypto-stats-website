<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imgs/btc.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Crypto Info</title>
</head>
<body>
    <div class="stats">
        <h1><img src="imgs/btc.png" alt="btc-logo" width="25" height="25"> LIVE BITCOIN STATS!</h1>
        <h4>updates every 1 milliseconds!</h4>
        <h3>Crypto Name: <span id="name"></span></h3>
        <h3>Price (USD): $<span id="price"></span></h3>
        <h3>Symbol: <span id="symbol"></span></h3>
        <h3>Rank: <span id="rank"></span></h3>
        <h3>Supply: <span id="supply"></span></h3>
        <h3>Max Supply: <span id="maxSupply"></span></h3>
        <h3>Market Cap (usd): $<span id="marketCap"></span></h3>
        <h3>Volume 24hr (usd): $<span id="volumeUsd24Hr"></span></h3>
        <h3>Change Percent 24hr: <span id="changePercent24Hr"></span></h3>
        <h3>Vwap 24hr: <span id="vwap24Hr"></span></h3>
        <h3>Explorer: <span id="explorer"></span></h3>
    </div>
    


   

    <h1>Other Crypto's:</h1>
    <h2>Comming Soooooon!</h2>
    <div class="footer">
        <h1>Subscribe <a href="http://youtube.com/c/codingwithuday" target="_">Coding With Uday</a></h1>
    </div>
    <script src="script.js"></script>
</body>
</html>
